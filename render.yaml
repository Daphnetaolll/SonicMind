# Render Blueprint for SonicMind.
# This file intentionally uses placeholders and sync:false for secrets.
databases:
  - name: sonicmind-postgres
    databaseName: sonicmind
    user: sonicmind
    plan: starter

services:
  - type: web
    name: sonicmind-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements-production.txt
    preDeployCommand: python scripts/init_db.py
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sonicmind-postgres
          property: connectionString
      - key: BACKEND_SECRET_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_CREATOR_PRICE_ID
        sync: false
      - key: STRIPE_PRO_PRICE_ID
        sync: false
      - key: FRONTEND_BASE_URL
        value: https://sonicmind.onrender.com
      - key: SONICMIND_ENABLE_DEMO_BILLING_ROLLOVER
        value: "false"
      - key: LLM_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: BACKEND_CORS_ORIGINS
        # Include every browser origin that hosts the React app; CORS compares exact origins.
        value: https://sonicmind.onrender.com
      - key: APP_ENV
        value: production
      - key: SONICMIND_MODE
        value: production_light
      - key: WEB_SEARCH_PROVIDER
        value: tavily
      - key: SONICMIND_RETRIEVAL_BACKEND
        value: lexical
      - key: SONICMIND_MEMORY_LOGS
        value: "true"
      - key: RAG_TOP_K
        value: "3"
      - key: RAG_CANDIDATE_K
        value: "12"
      - key: MAX_CONTEXT_CHARS
        value: "6000"
      - key: MAX_SOURCE_CHARS
        value: "2000"
      - key: ENABLE_RERANKER
        value: "false"
      - key: ENABLE_LOCAL_EMBEDDING_MODEL
        value: "false"
      - key: RAG_LOAD_ON_STARTUP
        value: "false"
      - key: RAG_FALLBACK_MODE
        value: keyword
      - key: WEB_CONCURRENCY
        value: "1"
      - key: MALLOC_ARENA_MAX
        value: "2"
      - key: OMP_NUM_THREADS
        value: "1"
      - key: OPENBLAS_NUM_THREADS
        value: "1"
      - key: MKL_NUM_THREADS
        value: "1"
      - key: NUMEXPR_NUM_THREADS
        value: "1"
      - key: TOKENIZERS_PARALLELISM
        value: "false"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: TAVILY_API_KEY
        sync: false
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: DISCOGS_USER_TOKEN
        sync: false

  - type: web
    name: sonicmind-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://sonicmind-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
