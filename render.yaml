# Render Blueprint for SonicMind.
# This file intentionally uses placeholders and sync:false for secrets.
databases:
  - name: sonicmind-postgres
    databaseName: sonicmind
    user: sonicmind
    plan: starter

services:
  - type: web
    name: sonicmind-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python scripts/init_db.py
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sonicmind-postgres
          property: connectionString
      - key: BACKEND_SECRET_KEY
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: BACKEND_CORS_ORIGINS
        value: https://sonicmind-frontend.onrender.com
      - key: WEB_SEARCH_PROVIDER
        value: tavily
      - key: TAVILY_API_KEY
        sync: false
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: DISCOGS_USER_TOKEN
        sync: false

  - type: web
    name: sonicmind-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://sonicmind-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
